name: "Octelium"
description: "Connect to Octelium Clusters from Github Action workflows"
branding:
  icon: "check"
  color: "black"
inputs:
  domain:
    description: "Octelium Cluster domain"
    required: true
  auth-token:
    description: "Authentication token. If set, it is used instead of the GitHub Actions OIDC assertion."
  dev:
    description: "Dev mode"
  insecure-tls:
    description: "Insecure TLS mode"
  wait:
    description: "Wait in seconds after connecting"
    default: "4"
  args:
    description: "The arguments of the octelium-connect command (whitespace separated)"
  audience:
    description: "Override the audience of the GitHub Actions OIDC assertion"
  command:
    description: "Invoke an Octelium command. By default it connects to the Cluster"
    required: true
    default: "connect"
runs:
  using: "composite"
  steps:
    - name: Install in Linux/MacOS
      if: inputs.command == 'connect' && (runner.os == 'Linux' || runner.os == 'macOS')
      shell: bash
      run: |
        set -euo pipefail
        curl -H "User-Agent: octelium-github-actions" -fsSL https://octelium.com/install.sh | bash
        octelium version

    - name: Install in Windows
      if: inputs.command == 'connect' && runner.os == 'Windows'
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        iwr https://octelium.com/install.ps1 -useb | iex
        octelium version

    - name: Run in Linux/MacOS
      if: inputs.command == 'connect' && (runner.os == 'Linux' || runner.os == 'macOS')
      shell: bash
      env:
        OCTELIUM_DOMAIN: ${{ inputs.domain }}
        OCTELIUM_AUTH_TOKEN: ${{ inputs.auth-token }}
        OCTELIUM_DEV: ${{ inputs.dev }}
        OCTELIUM_INSECURE_TLS: ${{ inputs.insecure-tls }}
        OCTELIUM_LOGOUT: "true"
        AUDIENCE: ${{ inputs.audience }}
        EXTRA_ARGS: ${{ inputs.args }}
        WAIT: ${{ inputs.wait }}
      run: |
        set -euo pipefail

        cmd=(sudo -E octelium connect)

        if [ -z "$OCTELIUM_AUTH_TOKEN" ]; then
          if [ -n "$AUDIENCE" ]; then
            cmd+=(--assertion "github-actions:audience=${AUDIENCE}")
          else
            cmd+=(--assertion github-actions)
          fi
        fi

        if [ -n "$EXTRA_ARGS" ]; then
          set -f
          cmd+=($EXTRA_ARGS)
          set +f
        fi

        echo "Running: ${cmd[*]}"

        "${cmd[@]}" &
        CONNECT_PID=$!

        sleep "$WAIT"

        if ! kill -0 "$CONNECT_PID" 2>/dev/null; then
          echo "::error::octelium connect exited before it became ready"
          wait "$CONNECT_PID" || true
          exit 1
        fi

    - name: Run in Windows
      if: inputs.command == 'connect' && runner.os == 'Windows'
      shell: powershell
      env:
        OCTELIUM_DOMAIN: ${{ inputs.domain }}
        OCTELIUM_AUTH_TOKEN: ${{ inputs.auth-token }}
        OCTELIUM_DEV: ${{ inputs.dev }}
        OCTELIUM_INSECURE_TLS: ${{ inputs.insecure-tls }}
        OCTELIUM_LOGOUT: "true"
        AUDIENCE: ${{ inputs.audience }}
        EXTRA_ARGS: ${{ inputs.args }}
        WAIT: ${{ inputs.wait }}
      run: |
        $ErrorActionPreference = "Stop"

        $cliArgs = @("connect")

        if (-not $env:OCTELIUM_AUTH_TOKEN) {
          if ($env:AUDIENCE) {
            $cliArgs += @("--assertion", "github-actions:audience=$($env:AUDIENCE)")
          } else {
            $cliArgs += @("--assertion", "github-actions")
          }
        }

        if ($env:EXTRA_ARGS) {
          $cliArgs += $env:EXTRA_ARGS.Split(" ", [System.StringSplitOptions]::RemoveEmptyEntries)
        }

        Write-Host "Running: octelium $($cliArgs -join ' ')"

        $proc = Start-Process -FilePath "octelium" -ArgumentList $cliArgs -PassThru -NoNewWindow
        Start-Sleep -Seconds ([int]$env:WAIT)

        if ($proc.HasExited) {
          Write-Error "octelium connect exited before it became ready (exit code $($proc.ExitCode))"
          exit 1
        }

    - name: Logout
      if: inputs.command == 'logout'
      shell: bash
      env:
        OCTELIUM_DOMAIN: ${{ inputs.domain }}
        OCTELIUM_DEV: ${{ inputs.dev }}
        OCTELIUM_INSECURE_TLS: ${{ inputs.insecure-tls }}
      run: |
        set -euo pipefail

        if ! command -v octelium >/dev/null 2>&1; then
          curl -H "User-Agent: octelium-github-actions" -fsSL https://octelium.com/install.sh | bash
        fi

        octelium logout